spring:
  application:
    name: wakfu-builder-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

client:
  base-url: https://wakfu.cdn.ankama.com/gamedata/
  images:
    primary-url: https://static.ankama.com/wakfu/portal/game/item/115/
    secondary-url: https://vertylo.github.io/wakassets/items/
